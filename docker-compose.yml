version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://biletiks:biletiks@db:5432/biletiks
      - PORT=5000
      - APP_URL=${APP_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TELEGRAM_GROUP_BOT_TOKEN=${TELEGRAM_GROUP_BOT_TOKEN}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID}
      - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: biletiks
      POSTGRES_PASSWORD: biletiks
      POSTGRES_DB: biletiks
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biletiks"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
